<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React + Tailwind App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [count, setCount] = useState(0);

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full border border-gray-100">
                        <div className="flex justify-center mb-6">
                            <div className="bg-blue-100 p-3 rounded-full">
                                <svg className="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                </svg>
                            </div>
                        </div>
                        
                        <h1 className="text-2xl font-bold text-gray-800 text-center mb-2">
                            React + Tailwind
                        </h1>
                        <p className="text-gray-500 text-center mb-8">
                            A lightweight setup using CDNs for rapid prototyping.
                        </p>

                        <div className="space-y-4">
                            <div className="text-center text-4xl font-mono font-bold text-blue-600 mb-4">
                                {count}
                            </div>
                            
                            <button 
                                onClick={() => setCount(count + 1)}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200 transform active:scale-95 shadow-lg shadow-blue-200"
                            >
                                Increment Counter
                            </button>
                            
                            <button 
                                onClick={() => setCount(0)}
                                className="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-2 px-6 rounded-xl transition-all duration-200"
                            >
                                Reset
                            </button>
                        </div>
                        
                        <div className="mt-8 pt-6 border-t border-gray-100 text-center">
                            <span className="text-xs text-gray-400 uppercase tracking-widest font-semibold">
                                Powered by CDNs
                            </span>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
